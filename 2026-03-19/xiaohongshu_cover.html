<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        .card {
            width: 800px;
            height: 1000px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }
        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 60%);
        }
        .icon {
            font-size: 120px;
            margin-bottom: 30px;
        }
        h1 {
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 56px;
            font-weight: bold;
            text-align: center;
            margin: 0 0 20px 0;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.2);
        }
        h2 {
            color: rgba(255,255,255,0.9);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 36px;
            font-weight: normal;
            text-align: center;
            margin: 0 0 40px 0;
        }
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 0 40px;
        }
        .tag {
            background: rgba(255,255,255,0.25);
            color: white;
            padding: 12px 28px;
            border-radius: 30px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 22px;
            backdrop-filter: blur(10px);
        }
        .footer {
            position: absolute;
            bottom: 40px;
            color: rgba(255,255,255,0.7);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">🤖🎨</div>
        <h1>AI绘画工具</h1>
        <h2>2024最全测评对比</h2>
        <div class="tags">
            <span class="tag">Midjourney</span>
            <span class="tag">Stable Diffusion</span>
            <span class="tag">DALL·E 3</span>
            <span class="tag">文心一格</span>
        </div>
        <div class="footer">小红书 @AI探索者</div>
    </div>
</body>
</html>
